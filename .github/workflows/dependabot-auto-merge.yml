name: Dependabot auto-merge

# Enables GitHub native auto-merge on Dependabot PRs for minor and patch
# updates. The merge only happens once all required status checks defined by
# the branch protection rule on `main` pass — i.e. the full CI pipeline
# (format, lint, typecheck, build) plus the Playwright UI smoke tests, gated
# behind the `CI Passed` check. Major version bumps are intentionally left for
# manual review.
#
# Requirements (configured once in repo settings, see .github/AUTOMATION.md):
#   - Settings > General > "Allow auto-merge" enabled
#   - A branch protection rule on `main` requiring the `CI Passed` status check

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for minor and patch updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

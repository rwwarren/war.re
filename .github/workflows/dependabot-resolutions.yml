name: Dependabot resolutions auto-fix

# Opens a PR adding yarn `resolutions` overrides for open Dependabot alerts
# that Dependabot itself cannot fix — transitive deps pinned by a parent
# package (e.g. postcss pinned by next). Stock Dependabot security updates
# never author resolutions, so these alerts would otherwise sit open forever.
#
# Direct-dependency alerts are still handled by Dependabot security updates;
# this only fills the transitive-pinned gap.
#
# Requirements (one-time):
#   - Repo secret AUTOFIX_TOKEN: a PAT with contents:write + pull-requests:write
#     on this repo. A PAT (not GITHUB_TOKEN) is required so the opened PR
#     triggers the CI workflows behind the `CI Passed` branch-protection gate.

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC, aligns with weekly Dependabot
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolutions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.AUTOFIX_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Apply resolutions for open npm alerts
        id: apply
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_TOKEN }}
        run: |
          set -euo pipefail
          alerts=$(gh api --paginate \
            "repos/$GITHUB_REPOSITORY/dependabot/alerts?state=open&ecosystem=npm" \
            --jq '.[] | select(.dependency.package.ecosystem=="npm") | {pkg:.dependency.package.name, dir:(.dependency.manifest_path|sub("/[^/]+$";"")), patched:.security_vulnerability.first_patched_version.identifier} | @json')

          if [ -z "$alerts" ]; then
            echo "No open npm alerts."
            echo "changed=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$alerts" | while read -r a; do
            pkg=$(echo "$a" | jq -r .pkg)
            dir=$(echo "$a" | jq -r .dir)
            patched=$(echo "$a" | jq -r .patched)
            if [ "$patched" = "null" ]; then
              echo "Skip $pkg: alert has no patched version."
              continue
            fi
            f="$dir/package.json"
            tmp=$(mktemp)
            jq --arg p "$pkg" --arg v "^$patched" '.resolutions[$p] = $v' "$f" >"$tmp"
            mv "$tmp" "$f"
            echo "Set $pkg ^$patched in $f"
          done

          for d in main subdomains/ryan; do
            if ! git diff --quiet -- "$d/package.json"; then
              (cd "$d" && yarn install && yarn prettier --write package.json)
            fi
          done

          if git diff --quiet; then
            echo "No changes after install (alerts already satisfied)."
            echo "changed=false" >>"$GITHUB_OUTPUT"
          else
            echo "changed=true" >>"$GITHUB_OUTPUT"
          fi

      - name: Open PR
        if: steps.apply.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_TOKEN }}
        run: |
          set -euo pipefail
          branch="security/auto-resolutions"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add -A
          git commit -m "fix(deps): force patched versions via resolutions

          Auto-generated from open Dependabot alerts requiring a resolutions
          override (transitive deps pinned by a parent package).

          Helped by the minions"
          git push --force origin "$branch"

          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create --head "$branch" --base main \
              --title "fix(deps): patch Dependabot alerts via resolutions" \
              --body "Auto-generated by the \`Dependabot resolutions auto-fix\` workflow.

          Forces patched versions for open Dependabot alerts that need a yarn \`resolutions\` override (transitive deps pinned by a parent, which Dependabot cannot fix itself).

          Review the bumped lockfiles and merge once CI is green."
          else
            echo "Open PR already exists for $branch; pushed update."
          fi

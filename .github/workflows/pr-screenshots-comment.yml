name: PR screenshots comment

# Stage 2 of 2: triggered when "PR screenshots" finishes. Runs in the trusted
# base-repo context with a write token but NEVER checks out or runs PR code. It
# downloads the screenshot artifact, commits the images to the orphan
# `pr-screenshots` branch, and posts (or updates) an inline comment on the PR.
#
# Inline images are served from raw.githubusercontent.com, which requires the
# repository to be public. For a private repo, use the artifact from the
# "PR screenshots" run instead (or switch hosting in this workflow).

on:
  workflow_run:
    workflows: ['PR screenshots']
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Download screenshot artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-screenshots
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: screenshots

      - name: Publish screenshots and comment
        run: |
          set -euo pipefail
          PR=$(cat screenshots/pr-number.txt)
          SHORT=${SHA:0:7}

          # Publish images to the orphan pr-screenshots branch under pr-<num>/<sha>/.
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          if git clone --depth 1 --branch pr-screenshots "$REMOTE" branch 2>/dev/null; then
            cd branch
          else
            mkdir branch && cd branch
            git init -q
            git remote add origin "$REMOTE"
            git checkout -q --orphan pr-screenshots
          fi
          rm -rf "pr-${PR}"
          mkdir -p "pr-${PR}/${SHORT}"
          cp ../screenshots/*.png "pr-${PR}/${SHORT}/"
          git add -A
          git commit -q -m "screenshots: PR #${PR} @ ${SHORT}"
          git push -q origin pr-screenshots
          cd ..

          # Build the comment body with inline images. Use echo (not a heredoc)
          # so the YAML block indentation never leaks into the markdown.
          RAW="https://raw.githubusercontent.com/${REPO}/pr-screenshots/pr-${PR}/${SHORT}"
          {
            echo '<!-- pr-screenshots-bot -->'
            echo '## 📸 Preview screenshots'
            echo ''
            echo "_Captured from the static build of commit \`${SHORT}\`._"
            echo ''
            echo '### war.re'
            echo '| Desktop | Mobile |'
            echo '| :---: | :---: |'
            echo "| <img src=\"${RAW}/war.re-desktop.png\" width=\"420\"> | <img src=\"${RAW}/war.re-mobile.png\" width=\"200\"> |"
            echo ''
            echo '### ryan.war.re'
            echo '| Desktop | Mobile |'
            echo '| :---: | :---: |'
            echo "| <img src=\"${RAW}/ryan.war.re-desktop.png\" width=\"420\"> | <img src=\"${RAW}/ryan.war.re-mobile.png\" width=\"200\"> |"
          } > body.md

          # Post a new sticky comment or update the existing one.
          jq -n --arg body "$(cat body.md)" '{body: $body}' > payload.json
          existing=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            --jq '[.[] | select(.body | startswith("<!-- pr-screenshots-bot -->"))][0].id')
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${existing}" --input payload.json
          else
            gh api -X POST "repos/${REPO}/issues/${PR}/comments" --input payload.json
          fi

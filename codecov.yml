# Coverage is collected per app and source, each under its own flag:
#   - ryan:    Jest unit tests in subdomains/ryan
#   - main:    Jest unit tests in main/
#   - main-e2e: Playwright V8 coverage from main/'s UI smoke tests (what the
#     browser actually executes, complementing the unit tests)
coverage:
  status:
    project:
      ryan:
        target: auto
        threshold: 1%
        flags:
          - ryan
      main:
        target: auto
        threshold: 1%
        flags:
          - main
      main-e2e:
        target: auto
        threshold: 1%
        flags:
          - main-e2e
    patch:
      default:
        target: 90%
        informational: true

flags:
  ryan:
    paths:
      - subdomains/ryan
    carryforward: true
  main:
    paths:
      - main
    carryforward: true
  main-e2e:
    paths:
      - main
    carryforward: true

comment:
  layout: "reach, diff, flags, files"
  require_changes: true

ignore:
  - "**/*.test.*"
  - "**/*.spec.*"
  - "**/__tests__/**"
  - "e2e/**"

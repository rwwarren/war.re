name: PR screenshots comment

# Posts screenshots for PRs whose triggering workflow had a read-only token:
# Dependabot and fork PRs. Same-repo PRs are commented directly by
# `pr-screenshots.yml`, so they are excluded here to avoid double comments.
#
# Triggered via workflow_run so it executes from the default branch in the
# trusted base context with a write token, and it never checks out PR code.

on:
  workflow_run:
    workflows: ['PR screenshots']
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  comment:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.actor.login == 'dependabot[bot]' ||
       github.event.workflow_run.head_repository.full_name != github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download screenshot artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-screenshots
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: screenshots

      - name: Publish screenshots comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          PR=$(cat screenshots/pr-number.txt)
          export PR
          bash scripts/post-screenshots.sh

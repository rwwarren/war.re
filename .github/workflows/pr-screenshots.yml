name: PR screenshots

# Builds both apps and captures desktop + mobile screenshots of the /n content
# route. For same-repo PRs (e.g. the owner's branches) the token is writable, so
# this workflow publishes the inline comment directly — that includes the PR
# that introduces this workflow. Dependabot and fork PRs get a read-only token
# here, so their comment is posted by the companion `pr-screenshots-comment.yml`
# workflow, which runs in the trusted base context and never executes PR code.

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  capture:
    # Same-repo PRs only (this includes Dependabot, whose branches live in the
    # repo). Fork PRs are skipped entirely, so untrusted fork code is never
    # built or run by this automation.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: |
            main/yarn.lock
            subdomains/ryan/yarn.lock

      - name: Build main site
        working-directory: main
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Build ryan subdomain
        working-directory: subdomains/ryan
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Install Playwright browser
        working-directory: main
        run: yarn playwright install --with-deps chromium

      - name: Capture screenshots
        run: |
          mkdir -p "$GITHUB_WORKSPACE/screenshots"
          (cd main && node "$GITHUB_WORKSPACE/scripts/screenshot.mjs" "war.re" "$GITHUB_WORKSPACE/screenshots" 4001)
          (cd subdomains/ryan && node "$GITHUB_WORKSPACE/scripts/screenshot.mjs" "ryan.war.re" "$GITHUB_WORKSPACE/screenshots" 4002)

      - name: Record PR number
        run: echo "${{ github.event.pull_request.number }}" > "$GITHUB_WORKSPACE/screenshots/pr-number.txt"

      # For Dependabot / fork PRs the companion workflow posts the comment.
      - uses: actions/upload-artifact@v7
        with:
          name: pr-screenshots
          path: screenshots/
          retention-days: 7

      # Same-repo PRs have a writable token, so comment inline right away.
      - name: Publish screenshots comment
        if: github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/post-screenshots.sh

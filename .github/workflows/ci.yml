name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      main: ${{ steps.filter.outputs.main }}
      ryan: ${{ steps.filter.outputs.ryan }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            main:
              - 'main/**'
              - '.github/workflows/ci.yml'
            ryan:
              - 'subdomains/ryan/**'
              - '.github/workflows/ci.yml'

  main-site:
    name: Main Site (war.re)
    needs: changes
    if: needs.changes.outputs.main == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: main/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn test:coverage --ci
      - run: yarn format:check
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn build
      - name: Install Playwright browser
        run: yarn playwright install --with-deps chromium
      - name: UI smoke tests
        run: yarn e2e

  ryan-site:
    name: Ryan Subdomain (ryan.war.re)
    needs: changes
    if: needs.changes.outputs.ryan == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: subdomains/ryan
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: subdomains/ryan/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn test:coverage --ci
      - run: yarn format:check
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn build
      - name: Install Playwright browser
        run: yarn playwright install --with-deps chromium
      - name: UI smoke tests
        run: yarn e2e

  ci-passed:
    name: CI Passed
    needs: [main-site, ryan-site]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any upstream job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: Success
        run: echo "All required jobs passed or were skipped."
